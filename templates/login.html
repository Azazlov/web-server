{% extends "base.html" %}

{% block title %}Вход - FileShare Local{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: 
            radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
    }
    
    .auth-card {
        width: 100%;
        max-width: 420px;
        animation: slideUp 0.6s ease-out;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .auth-header {
        text-align: center;
        padding: 40px 20px 30px !important;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        border-radius: 16px 16px 0 0 !important;
    }
    
    .auth-header i {
        font-size: 4rem;
        margin-bottom: 15px;
        display: block;
        animation: bounceIn 0.8s ease-out;
    }
    
    @keyframes bounceIn {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
    }
    
    .auth-header h4 {
        margin: 0;
        font-weight: 700;
        letter-spacing: -0.5px;
    }
    
    .auth-body {
        padding: 30px !important;
    }
    
    .form-control {
        transition: all 0.3s ease;
    }
    
    .form-control:focus {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
    }
    
    .btn-login {
        padding: 14px;
        font-size: 1rem;
        font-weight: 600;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        transition: all 0.3s ease;
    }
    
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    
    .auth-divider {
        display: flex;
        align-items: center;
        margin: 25px 0;
    }
    
    .auth-divider::before,
    .auth-divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid #e2e8f0;
    }
    
    .auth-divider span {
        padding: 0 15px;
        color: #a0aec0;
        font-size: 0.85rem;
    }
    
    .register-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
        padding: 8px 16px;
        border-radius: 8px;
        transition: all 0.3s ease;
    }
    
    .register-link:hover {
        background: rgba(102, 126, 234, 0.1);
        color: #764ba2;
        transform: translateX(5px);
    }
    
    .input-group-custom {
        position: relative;
        margin-bottom: 20px;
    }
    
    .input-group-custom i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #a0aec0;
        font-size: 1.1rem;
        transition: color 0.3s ease;
    }
    
    .input-group-custom .form-control {
        padding-left: 45px;
    }
    
    .input-group-custom:focus-within i {
        color: #667eea;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="card shadow-lg">
            <div class="auth-header">
                <i class="bi bi-box-arrow-in-right"></i>
                <h4>Вход в систему</h4>
                <p class="text-white-50 mb-0 mt-2">FileShare Local</p>
            </div>
            <div class="auth-body">
                <form method="POST">
                    <div class="input-group-custom">
                        <i class="bi bi-person"></i>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Имя пользователя" required autofocus>
                    </div>
                    
                    <div class="input-group-custom">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Пароль" required>
                    </div>
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-login">
                            <i class="bi bi-box-arrow-in-right me-2"></i>
                            Войти
                        </button>
                    </div>
                </form>
                
                <div class="auth-divider">
                    <span>или</span>
                </div>
                
                <div class="text-center">
                    <a href="{{ url_for('auth.register') }}" class="register-link">
                        <i class="bi bi-person-plus"></i>
                        <span>Нет учётной записи? Зарегистрироваться</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
